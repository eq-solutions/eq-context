name: Security audit

# Standing security gate for the EQ Supabase surface. Runs weekly + on
# demand + whenever the security tooling changes. Two checks:
#   1. RLS zero-rows probe — public-key data-leak test. No secret needed.
#   2. Advisor audit — flags NEW ERROR-level Supabase advisories. Needs the
#      SUPABASE_ACCESS_TOKEN secret; no-ops cleanly until that's set.
#
# ADVISORY mode: the two finding steps are continue-on-error, so findings show in
# the run but do NOT fail the build yet. Make it a blocking gate by removing the
# `continue-on-error: true` lines once the signal is trusted. Scope is EQ-only;
# SKS-Labour (retiring) was dropped from both scripts.
# See ops/security-register.md for the tracked findings these gate against.

on:
  schedule:
    - cron: "17 19 * * 0"   # Sundays ~05:17 Sydney — off the :00 mark
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/rls_probe.py"
      - "scripts/security_audit.py"
      - "scripts/test_security.py"
      - ".github/workflows/security-audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Unit tests (probe + triage logic)
        run: python3 scripts/test_security.py

      - name: RLS zero-rows probe (public key must read 0 rows)
        continue-on-error: true   # advisory — remove to make this a blocking gate
        run: python3 scripts/rls_probe.py

      - name: Supabase advisor audit (flags NEW ERROR findings)
        continue-on-error: true   # advisory — remove to make this a blocking gate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: python3 scripts/security_audit.py
