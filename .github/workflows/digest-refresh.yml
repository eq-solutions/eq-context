name: Refresh digest.md

# Regenerates digest.md — the push-style "what needs your attention" feed
# (CI failures, aging PRs, stale deploys, substrate drift). Companion to the
# suite-state refresh; runs after it so the day's picture is settled.
#
# Cross-repo reads use GITHUB_TOKEN — eq-solutions repos are public, so it's
# sufficient for PR + Actions reads. NETLIFY_TOKEN is optional (deploy section
# only appears when it's set). Commits with [skip ci] so the bot push doesn't
# re-trigger the MD/frontmatter workflows.

on:
  schedule:
    # 12:00 UTC = 10pm AEST — after suite-state (10:00) and honesty (11:00).
    - cron: '0 12 * * *'
  workflow_dispatch:
  repository_dispatch:
    # Fired by EQ repos on push to main once EQ_CONTEXT_PAT (workflow scope)
    # is added to eq-context repo secrets and sender jobs are wired.
    types: [suite-state-changed]

permissions:
  contents: write

concurrency:
  # Serialize every substrate-committing run. digest-refresh AND
  # suite-state-refresh share this group so no two ever push to main at once —
  # the concurrent-push race that silently left digest.md stale after bursts of
  # merges (each run regenerated fine but lost the `git push` to a sibling run).
  # cancel-in-progress: false — queue each so it applies in turn; a queued run
  # checks out after the prior one pushed, so it regenerates from full current
  # state and pushes cleanly.
  group: eq-context-substrate-push
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # requests for the digest itself; pyyaml for the substrate-honesty subprocess.
      - run: pip install requests pyyaml

      - name: Generate digest.md
        env:
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          NETLIFY_TOKEN:      ${{ secrets.NETLIFY_TOKEN }}
          SENTRY_AUTH_TOKEN:  ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: python .github/scripts/refresh_digest.py

      - name: Generate sessions/INDEX.md
        run: python scripts/generate_session_index.py

      - name: Generate live-check canary
        # Cheap, unpredictable-enough token for Claude Chat's connector to quote
        # verbatim as proof of a live read (see CHAT-PROMPT.md rule 2). A stale
        # or hallucinated read can't produce today's date + this exact commit
        # SHA + run number by accident, so a mismatch is obvious to a human at
        # a glance — unlike a self-reported "freshness date" (F1 in failures.md).
        run: |
          {
            echo "---"
            echo "title: SYSTEM — Live-Check Canary"
            echo "owner: Royce Milmlow"
            echo "last_updated: $(date -u +%Y-%m-%d)"
            echo "scope: Machine-written canary for Claude Chat's connector freshness check. Rewritten every digest-refresh run — never edit by hand."
            echo "read_priority: high"
            echo "status: live"
            echo "---"
            echo ""
            echo "LIVE · $(date -u +%Y-%m-%dT%H:%MZ) · commit $(git rev-parse --short HEAD) · run ${GITHUB_RUN_NUMBER}"
          } > system/live-check.md

      - name: Commit if changed
        run: |
          git config user.name  "eq-suite-bot"
          git config user.email "bot@eq.solutions"
          git add digest.md sessions/INDEX.md system/live-check.md
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: nightly health digest $(date -u +%Y-%m-%d) [skip ci]"
          # The concurrency group above serializes the bots, but a human push to
          # main can still land mid-run — rebase onto latest and retry rather
          # than fail and leave digest.md stale.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest origin/main"
            git pull --rebase --autostash origin main || git rebase --abort || true
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
