name: Backup eq-canonical (identity/control plane DB → R2)

# Platform-level offsite backup of eq-canonical (jvknxcmbtrfnxfrwfimn) — the Shell
# IDENTITY / control plane — to Cloudflare R2. Phase 2 of issue eq-context #60,
# reusing the ehow template (`.github/workflows/backup-ehow.yml`) parameterised per
# project. Losing this project loses platform identity, and today it has NO offsite
# copy. See system/dr-backups.md for the decision doc + recovery tiers.
#
# What it captures (a COMPLETE logical backup, per Supabase's own recipe):
#   - roles.sql       (--role-only)
#   - schema.sql      (DDL for all schemas)
#   - data.sql        (--data-only --use-copy — the ROWS of shell_control, public,
#                       app_data, etc.)
#   - auth_data.sql   (--data-only --schema auth — the auth.users crown jewel)
#   NOTE 1: a bare `supabase db dump` is SCHEMA-ONLY. The three-file form below is
#     the fix (same defect the retired eq-service job had).
#   NOTE 2 (identity-plane-specific): `supabase db dump` EXCLUDES the managed `auth`
#     schema by default, so a plain dump of an identity plane silently omits
#     auth.users. Tier-1 (Supabase managed daily) dies WITH the account in the exact
#     provider-loss disaster the offsite tier exists for — so auth is captured
#     explicitly here (CAPTURE_AUTH=true) and guarded to be non-empty (50 live users
#     verified 2026-07-04). Auth *restore* mechanics are worked out by the drill.
#   Plus: every storage bucket (recursively) — 6 buckets / 213 objects verified.
#
# Read-only against live: dump = pg_dump (SELECT), storage = GET. Nothing is written
# back to any live Supabase project. R2 is our own backup bucket.
#
# Schedule: every day 03:00 UTC (~13:00 AEST) — staggered 1h after ehow (02:00) so
# the three daily jobs don't contend on the runner/R2 at once. Manual: workflow_dispatch.
#
# Secrets (add to the `production-ops` GitHub Environment — same environment as the
# ehow job; see the arming checklist in system/dr-backups.md).
#   REUSED from the ehow (Phase 1) arming — no new copies needed:
#     SUPABASE_ACCESS_TOKEN  - Supabase personal access token (sbp_…, org-wide)
#     SENTRY_DSN             - client ingest DSN for the cron monitor
#     R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT / R2_BUCKET_NAME
#   NEW for this project (must be ADDED — production-grade sensitive, contains auth.users):
#     EQ_CANONICAL_DB_URL           - eq-canonical session-pooler URI
#         (postgresql://postgres.jvknxcmbtrfnxfrwfimn:[pass]@aws-…-pooler.supabase.com:5432/postgres)
#     EQ_CANONICAL_SERVICE_ROLE_KEY - eq-canonical service-role key (storage API access)
#   NOTE: the existing eq-context `SUPABASE_SERVICE_ROLE_KEY` is the EHOW key — do NOT
#   reuse it here; this project needs its own service-role key under a distinct name.
#
# R2 layout: everything for this project lives under the `eq-canonical/` prefix, so the
# three backup jobs can share one R2 bucket without colliding. Prune is scoped to the prefix.
#
# Alerting: a Sentry cron check-in monitor (slug `eq-canonical-daily-backup`). It checks
# in `in_progress` at start and `ok`/`error` at end, and declares its own crontab schedule —
# so Sentry pages BOTH on a failed run AND on a run that never happens (the silent-gap mode
# that hid a 7-week ehow outage). Skips cleanly with a loud warning until SENTRY_DSN is set,
# so the backup itself is never blocked on it.

on:
  schedule:
    # Every day 03:00 UTC (~13:00 AEST)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: eq-canonical → R2 (db + auth + storage)
    runs-on: ubuntu-latest
    # Privileged secrets (DB URL, R2 keys, service-role key) are scoped to this GitHub
    # Environment. Configure Settings → Environments → production-ops with a
    # deployment-branch rule = main only and NO required reviewers (this job runs on
    # schedule/dispatch from main, never on PRs), so the secrets can't be used from any
    # other ref and the cron is never paused waiting for an approval.
    environment: production-ops
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      MONITOR_SLUG: eq-canonical-daily-backup
      SUPABASE_URL: https://jvknxcmbtrfnxfrwfimn.supabase.co
      R2_PREFIX: eq-canonical
      EXPECT_STORAGE: 'true'
      CAPTURE_AUTH: 'true'
    steps:
      # ── Sentry cron: check in "in_progress" (upserts the monitor incl. schedule) ──
      - name: Sentry check-in (start)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -uo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set — this backup run is UNMONITORED. Add SENTRY_DSN (production-ops) to arm cron alerting."
            exit 0
          fi
          # Parse DSN: https://<public_key>@<host>/<project_id>
          KEY="${SENTRY_DSN#https://}"; KEY="${KEY%%@*}"
          REST="${SENTRY_DSN#*@}"; HOST="${REST%%/*}"; PID="${REST##*/}"
          BASE="https://${HOST}/api/${PID}/cron/${MONITOR_SLUG}/${KEY}"
          CID=$(curl -sS -X POST "${BASE}/" \
            -H 'Content-Type: application/json' \
            -d '{"status":"in_progress","monitor_config":{"schedule":{"type":"crontab","value":"0 3 * * *"},"checkin_margin":120,"max_runtime":45,"timezone":"UTC"}}' \
            | jq -r '.id // empty') || true
          echo "SENTRY_BASE=$BASE" >> "$GITHUB_ENV"
          echo "SENTRY_CID=$CID"  >> "$GITHUB_ENV"
          echo "Sentry monitor '${MONITOR_SLUG}' checked in (in_progress), id=${CID:-none}"

      - name: Set backup date
        run: echo "BACKUP_DATE=$(date -u +%Y-%m-%d_%H%M)" >> "$GITHUB_ENV"

      - name: Install Supabase CLI + AWS CLI + jq
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/
          supabase --version
          pip install awscli --quiet
          jq --version

      # ── Complete logical DB dump (roles + schema + data + auth) → tar.gz → R2 ──
      - name: Dump database (complete) via Supabase CLI
        env:
          SUPABASE_DB_URL: ${{ secrets.EQ_CANONICAL_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::EQ_CANONICAL_DB_URL is not set — cannot back up the database."
            exit 1
          fi
          supabase db dump --db-url "$SUPABASE_DB_URL" -f roles.sql  --role-only
          supabase db dump --db-url "$SUPABASE_DB_URL" -f schema.sql
          supabase db dump --db-url "$SUPABASE_DB_URL" -f data.sql \
            --use-copy --data-only \
            -x "storage.buckets_vectors" -x "storage.vector_indexes"

          # Silent-empty guard: a real dump has rows. Fail loudly rather than upload an
          # empty "backup" and report success (the trap issue #60 names).
          DATA_BYTES=$(wc -c < data.sql)
          echo "roles.sql=$(wc -c < roles.sql)B schema.sql=$(wc -c < schema.sql)B data.sql=${DATA_BYTES}B"
          if [ ! -s roles.sql ] || [ ! -s schema.sql ] || [ "$DATA_BYTES" -lt 2048 ]; then
            echo "::error::Dump looks empty/partial (data.sql=${DATA_BYTES} bytes) — refusing to upload."
            exit 1
          fi

          TAR_FILES="roles.sql schema.sql data.sql"

          # Identity plane: also capture the managed `auth` schema, which the default
          # dump above EXCLUDES. Naming --schema auth explicitly overrides the exclusion.
          # Omitting it would ship a hollow backup of the crown jewel (auth.users).
          if [ "${CAPTURE_AUTH}" = "true" ]; then
            # --use-copy so auth lands as a COPY block like data.sql (one consistent format
            # across the dump, and the verify job counts exact auth.users rows, not just
            # presence — a bare dump emits one multi-row INSERT that reads as "1").
            supabase db dump --db-url "$SUPABASE_DB_URL" -f auth_data.sql --data-only --schema auth --use-copy
            AUTH_BYTES=$(wc -c < auth_data.sql)
            echo "auth_data.sql=${AUTH_BYTES}B"
            # This project has live auth.users (50 verified 2026-07-04). An empty auth
            # dump means the capture silently failed — fail loudly, don't ship it hollow.
            if [ "$AUTH_BYTES" -lt 512 ]; then
              echo "::error::auth_data.sql looks empty (${AUTH_BYTES}B) but this identity plane has live users — refusing to ship a hollow backup. Confirm the --schema auth dump on the first armed run."
              exit 1
            fi
            TAR_FILES="$TAR_FILES auth_data.sql"
          fi

          tar czf "db_backup_${BACKUP_DATE}.tar.gz" $TAR_FILES
          ls -lh "db_backup_${BACKUP_DATE}.tar.gz"

      - name: Upload database backup to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 cp \
            "db_backup_${BACKUP_DATE}.tar.gz" \
            "s3://${R2_BUCKET}/${R2_PREFIX}/${BACKUP_DATE}/db_backup.tar.gz" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          echo "✅ DB backup uploaded: ${R2_PREFIX}/${BACKUP_DATE}/db_backup.tar.gz"

      # ── Every storage bucket, recursively — enumerate, then download in parallel ──
      # This project holds ~213 objects across ~134 nested folders. The old sequential
      # loop downloaded one file at a time and spawned a python3 process per file just
      # to URL-encode — it took ~15 min. We now (1) enumerate every object into a
      # manifest, encoding the URL in jq per path segment as we go, then (2) fan the
      # downloads out 8-wide with xargs. The ehow / eq-canonical-internal templates keep
      # the simpler sequential form — they hold <10 / 0 objects, so this machinery would
      # be cost without payoff there.
      - name: Sync ALL storage buckets
        env:
          SERVICE_ROLE_KEY: ${{ secrets.EQ_CANONICAL_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p storage_sync
          : > downloads.tsv   # one line per object: <local path>\t<download URL>

          # Enumerate every object under a bucket prefix (storage `list` is one level
          # deep; folders come back with a null id, so recurse). ENUMERATE ONLY here —
          # each object is appended to the manifest with its URL already percent-encoded
          # per path segment (spaces/specials handled, slashes preserved). The downloads
          # themselves run in parallel afterwards.
          enumerate_prefix () {
            local bucket="$1" prefix="$2" resp
            resp=$(curl -sS \
              -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -X POST "${SUPABASE_URL}/storage/v1/object/list/${bucket}" \
              -d "{\"prefix\":\"${prefix}\",\"limit\":10000,\"sortBy\":{\"column\":\"name\",\"order\":\"asc\"}}")
            echo "$resp" | jq -r \
              --arg b "$bucket" --arg p "$prefix" --arg base "$SUPABASE_URL" '
                .[] | select(.id != null) | ($p + .name) as $o
                | "storage_sync/\($b)/\($o)\t\($base)/storage/v1/object/\($b)/\($o | split("/") | map(@uri) | join("/"))"
              ' >> downloads.tsv
            local dirs folder
            mapfile -t dirs < <(echo "$resp" | jq -r '.[] | select(.id == null) | .name')
            for folder in "${dirs[@]}"; do
              [ -z "$folder" ] && continue
              enumerate_prefix "$bucket" "${prefix}${folder}/"
            done
          }

          # Discover buckets dynamically so a newly-added bucket is never silently missed.
          mapfile -t BUCKETS < <(curl -sS \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/storage/v1/bucket" | jq -r '.[].id')
          echo "Buckets discovered: ${BUCKETS[*]:-<none>}"

          if [ "${#BUCKETS[@]}" -eq 0 ]; then
            if [ "${EXPECT_STORAGE}" = "true" ]; then
              echo "::error::No storage buckets returned — service-role key or endpoint wrong. Refusing to report success."
              exit 1
            fi
            echo "::warning::No storage buckets for this project — nothing to back up (expected for a server-only data plane). Skipping storage upload."
            echo "STORAGE_UPLOAD=skip" >> "$GITHUB_ENV"
            exit 0
          fi

          for b in "${BUCKETS[@]}"; do
            [ -z "$b" ] && continue
            echo "--- Enumerating bucket: $b ---"
            enumerate_prefix "$b" ""
          done

          OBJ_COUNT=$(wc -l < downloads.tsv | tr -d '[:space:]')
          echo "Objects enumerated: ${OBJ_COUNT}"
          if [ "${OBJ_COUNT}" -eq 0 ]; then
            if [ "${EXPECT_STORAGE}" = "true" ]; then
              echo "::error::Enumerated 0 objects but this project holds live objects — treating as failure."
              exit 1
            fi
            echo "::warning::Buckets present (${BUCKETS[*]}) but empty — no objects to upload. Skipping storage upload."
            echo "STORAGE_UPLOAD=skip" >> "$GITHUB_ENV"
            exit 0
          fi

          # Pre-create target dirs once, single-threaded — no mkdir races during fan-out.
          cut -f1 downloads.tsv | while IFS= read -r lp; do mkdir -p "$(dirname "$lp")"; done

          # Fan the downloads out 8-wide. Records are NUL-delimited so object names with
          # spaces survive; the worker splits on the first tab. curl -fsS means any failed
          # object exits non-zero → xargs returns non-zero → set -e fails the whole job
          # (no silent partial backups).
          cat > dl_worker.sh <<'WORKER'
          #!/usr/bin/env bash
          set -euo pipefail
          rec="$1"
          lp="${rec%%$'\t'*}"
          url="${rec#*$'\t'}"
          curl -fsS -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" -o "$lp" "$url"
          WORKER
          chmod +x dl_worker.sh
          export SERVICE_ROLE_KEY
          tr '\n' '\0' < downloads.tsv | xargs -0 -P 8 -n 1 ./dl_worker.sh

          TOTAL=$(find storage_sync -type f | wc -l)
          echo "Total storage objects backed up: ${TOTAL} (expected ${OBJ_COUNT})"
          if [ "$TOTAL" -ne "$OBJ_COUNT" ]; then
            echo "::error::Downloaded ${TOTAL} files but enumerated ${OBJ_COUNT} — partial backup, treating as failure."
            exit 1
          fi

      - name: Upload storage to R2
        if: env.STORAGE_UPLOAD != 'skip'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          aws s3 sync \
            storage_sync/ \
            "s3://${{ secrets.R2_BUCKET_NAME }}/${R2_PREFIX}/${BACKUP_DATE}/storage/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          echo "✅ Storage synced: ${R2_PREFIX}/${BACKUP_DATE}/storage/"

      - name: Prune old backups (keep last 8 weeks)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '56 days ago' +%Y-%m-%d)
          # Scope the listing/prune to THIS project's prefix so it never touches ehow's
          # or the other project's backups sharing the bucket.
          aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/${R2_PREFIX}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | awk '{print $NF}' | tr -d '/' \
            | while read -r prefix; do
                [ -z "$prefix" ] && continue
                DATE_PART=$(echo "$prefix" | cut -d_ -f1)
                if [[ "$DATE_PART" < "$CUTOFF" ]]; then
                  echo "Pruning old backup: ${R2_PREFIX}/$prefix"
                  aws s3 rm "s3://${{ secrets.R2_BUCKET_NAME }}/${R2_PREFIX}/$prefix/" \
                    --recursive \
                    --endpoint-url "${{ secrets.R2_ENDPOINT }}"
                fi
              done
          echo "✅ Pruning complete (kept last 8 weeks)"

      # ── Sentry cron: report terminal status ──
      - name: Sentry check-in (ok)
        if: success() && env.SENTRY_BASE != ''
        run: |
          set -uo pipefail
          if [ -n "${SENTRY_CID:-}" ]; then
            curl -sS -X PUT "${SENTRY_BASE}/${SENTRY_CID}/" \
              -H 'Content-Type: application/json' -d '{"status":"ok"}' >/dev/null || true
          else
            curl -sS "${SENTRY_BASE}/?status=ok" >/dev/null || true
          fi
          echo "Sentry monitor checked in: ok"

      - name: Sentry check-in (error)
        if: failure() && env.SENTRY_BASE != ''
        run: |
          set -uo pipefail
          if [ -n "${SENTRY_CID:-}" ]; then
            curl -sS -X PUT "${SENTRY_BASE}/${SENTRY_CID}/" \
              -H 'Content-Type: application/json' -d '{"status":"error"}' >/dev/null || true
          else
            curl -sS "${SENTRY_BASE}/?status=error" >/dev/null || true
          fi
          echo "Sentry monitor checked in: error"
