name: DIAG - PAT scope check (temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check EQ_CONTEXT_PAT per-repo access (PRs vs Actions runs)
        env:
          GH_TOKEN: ${{ secrets.EQ_CONTEXT_PAT }}
        run: |
          for r in eq-shell eq-solves-service eq-field eq-cards eq-context; do
            pr_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/eq-solutions/$r/pulls?state=open")
            runs_code=$(curl -s -o /tmp/runs.json -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/eq-solutions/$r/actions/runs?branch=main&per_page=5&event=push")
            body_snippet=$(head -c 200 /tmp/runs.json)
            echo "$r: pulls=$pr_code runs=$runs_code body=$body_snippet"
          done
