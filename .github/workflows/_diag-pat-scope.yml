name: DIAG - PAT scope check (temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check EQ_CONTEXT_PAT scopes and per-repo access
        env:
          GH_TOKEN: ${{ secrets.EQ_CONTEXT_PAT }}
        run: |
          echo "## Token identity + OAuth scopes (classic PAT) or token type"
          curl -sI -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/user | grep -i -E "x-oauth-scopes|x-github-request-id|status" || true
          echo ""
          echo "## Per-repo Actions-runs read test"
          for r in eq-shell eq-solves-service eq-field eq-cards eq-context; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/eq-solutions/$r/actions/runs?per_page=1")
            echo "$r: HTTP $code"
          done
