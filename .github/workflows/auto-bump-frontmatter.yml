name: Auto-bump last_updated

# Safety net for last_updated frontmatter on merges to main.
# Pre-commit hook (.githooks/pre-commit) handles this locally, but commits
# made from machines without the hook installed (Cowork, Chat proposals
# merged via API, web-edit commits) bypass it. This workflow ensures
# last_updated reflects the merge date regardless of origin.
#
# Skips the bump if the commit author is the bot itself (prevents loop).

on:
  push:
    branches: [main]
    paths:
      - "**.md"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.event.head_commit.author.name != 'eq-context-bot'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Bump last_updated on changed MDs
        id: bump
        run: |
          set -euo pipefail
          today=$(TZ=Australia/Sydney date +%Y-%m-%d)
          changed=$(git diff --name-only HEAD^ HEAD -- '*.md' || true)
          [ -z "$changed" ] && { echo "no md changes"; echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; }

          touched=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            # Skip exempt areas
            case "$f" in
              README.md|COWORK-PROMPT.md|AGENTS.md|archive/*|sessions/*|.github/*|.githooks/*|md-health-reports/*) continue ;;
            esac
            # Only process files with a frontmatter block
            head -1 "$f" | grep -q '^---' || continue
            # In-place sed: replace last_updated: ... with today's date
            if grep -qE '^last_updated:' "$f"; then
              sed -i -E "s/^(last_updated:[[:space:]]*).*/\\1${today}/" "$f"
              touched=$((touched+1))
            fi
          done <<< "$changed"

          echo "touched=$touched" >> "$GITHUB_OUTPUT"
          if [ "$touched" -gt 0 ]; then
            git diff --quiet || echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "eq-context-bot"
          git config user.email "eq-context-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-bump last_updated to $(TZ=Australia/Sydney date +%Y-%m-%d) [skip ci]"
          git push origin main
