name: Frontmatter validation

# Server-side enforcement of eq-context frontmatter schema.
# Complements .githooks/pre-commit — catches anything that bypassed it
# (commits from machines without the hook installed, e.g. Cowork, Chat
# proposals merged via API, etc.). Pre-commit hooks aren't enforceable
# across surfaces; this workflow is the actual contract.

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/frontmatter-check.yml"
  push:
    branches: [main]
    paths:
      - "**.md"

jobs:
  schema:
    name: Frontmatter schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate frontmatter schema on tracked MDs
        run: |
          set -euo pipefail
          violations=0

          # Required keys for status:live docs (per system/md-style.md).
          # Files in archive/, drafts/, sessions/, .github/ are exempt.
          required="title owner last_updated scope read_priority status"

          for f in $(git ls-files '*.md'); do
            case "$f" in
              README.md|CHAT-PROMPT.md|COWORK-PROMPT.md|AGENTS.md|archive/*|drafts/*|sessions/*|.github/*|.githooks/*|md-health-reports/*)
                continue ;;
            esac

            # Must start with frontmatter block
            first=$(head -1 "$f" || true)
            if [ "$first" != "---" ]; then
              echo "::error file=$f::Missing YAML frontmatter delimiter"
              violations=$((violations+1))
              continue
            fi

            # Extract frontmatter block (lines 2..next ---)
            fm=$(awk 'NR==1{next} /^---[[:space:]]*$/{exit} {print}' "$f")

            for key in $required; do
              if ! echo "$fm" | grep -qE "^${key}:"; then
                echo "::error file=$f::Missing required frontmatter key '$key'"
                violations=$((violations+1))
              fi
            done

            # Validate last_updated is ISO date (YYYY-MM-DD)
            lu=$(echo "$fm" | grep -E '^last_updated:' | head -1 | sed -E 's/^last_updated:[[:space:]]*//' | tr -d '"' | tr -d "'")
            if [ -n "$lu" ] && ! echo "$lu" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
              echo "::error file=$f::last_updated must be ISO date (YYYY-MM-DD), got '$lu'"
              violations=$((violations+1))
            fi

            # Validate status is one of: live | draft | archived | deprecated
            st=$(echo "$fm" | grep -E '^status:' | head -1 | sed -E 's/^status:[[:space:]]*//' | tr -d '"' | tr -d "'")
            case "$st" in
              live|draft|archived|deprecated|"") ;;
              *)
                echo "::error file=$f::status must be one of: live|draft|archived|deprecated (got '$st')"
                violations=$((violations+1)) ;;
            esac
          done

          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations frontmatter violation(s) above."
            exit 1
          fi
          echo "All frontmatter valid."

  line-endings:
    name: Line endings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Reject CRLF in tracked text files
        run: |
          set -euo pipefail
          bad=$(git ls-files --eol | awk '$2 ~ /crlf/ && $4 ~ /\.(md|yml|yaml|json|sh|py)$/ {print $4}')
          if [ -n "$bad" ]; then
            echo "::error::CRLF detected in tracked text files. Re-save with LF or run 'git add --renormalize .' after confirming .gitattributes is present."
            echo "$bad"
            exit 1
          fi
          echo "All tracked text files use LF."
