name: Frontmatter validation

# Server-side enforcement of eq-context frontmatter schema.
# Complements .githooks/pre-commit — catches anything that bypassed it
# (commits from machines without the hook installed, e.g. Cowork, Chat
# proposals merged via API, etc.). Pre-commit hooks aren't enforceable
# across surfaces; this workflow is the actual contract.

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/frontmatter-check.yml"
  push:
    branches: [main]
    paths:
      - "**.md"

jobs:
  schema:
    name: Frontmatter schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontmatter schema on tracked MDs
        run: |
          set -euo pipefail
          violations=0

          # Required keys for status:live docs (per system/md-style.md).
          # Files in archive/, drafts/, sessions/, .github/ are exempt.
          required="title owner last_updated scope read_priority status"

          for f in $(git ls-files '*.md'); do
            case "$f" in
              README.md|COWORK-PROMPT.md|CHATGPT-PROMPT.md|GROK-PROMPT.md|AGENTS.md|archive/*|drafts/*|sessions/*|.github/*|.githooks/*|md-health-reports/*)
                continue ;;
            esac

            # Must start with frontmatter block
            first=$(head -1 "$f" || true)
            if [ "$first" != "---" ]; then
              echo "::error file=$f::Missing YAML frontmatter delimiter"
              violations=$((violations+1))
              continue
            fi

            # Extract frontmatter block (lines 2..next ---)
            fm=$(awk 'NR==1{next} /^---[[:space:]]*$/{exit} {print}' "$f")

            for key in $required; do
              if ! echo "$fm" | grep -qE "^${key}:"; then
                echo "::error file=$f::Missing required frontmatter key '$key'"
                violations=$((violations+1))
              fi
            done

            # Validate last_updated is ISO date (YYYY-MM-DD)
            lu=$(echo "$fm" | grep -E '^last_updated:' | head -1 | sed -E 's/^last_updated:[[:space:]]*//' | tr -d '"' | tr -d "'")
            if [ -n "$lu" ] && ! echo "$lu" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
              echo "::error file=$f::last_updated must be ISO date (YYYY-MM-DD), got '$lu'"
              violations=$((violations+1))
            fi

            # Validate status. Lifecycle states (live/draft/archived/deprecated)
            # plus the ADR/decision-doc states the substrate's own md-style.md
            # ADR format uses (proposed/accepted/superseded) — decision records
            # legitimately carry these.
            st=$(echo "$fm" | grep -E '^status:' | head -1 | sed -E 's/^status:[[:space:]]*//' | tr -d '"' | tr -d "'")
            case "$st" in
              live|draft|archived|deprecated|proposed|accepted|superseded|"") ;;
              *)
                echo "::error file=$f::status must be one of: live|draft|archived|deprecated|proposed|accepted|superseded (got '$st')"
                violations=$((violations+1)) ;;
            esac
          done

          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations frontmatter violation(s) above."
            exit 1
          fi
          echo "All frontmatter valid."

  line-endings:
    name: Line endings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject CRLF in tracked text files
        run: |
          set -euo pipefail
          bad=$(git ls-files --eol | awk '$2 ~ /crlf/ && $4 ~ /\.(md|yml|yaml|json|sh|py)$/ {print $4}')
          if [ -n "$bad" ]; then
            echo "::error::CRLF detected in tracked text files. Re-save with LF or run 'git add --renormalize .' after confirming .gitattributes is present."
            echo "$bad"
            exit 1
          fi
          echo "All tracked text files use LF."

  index-drift:
    name: Tier index vs folder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Every .md in a tier folder must be mentioned (by basename) in that
      # tier's README.md. Catches the drift where eq/README listed 8 of 20
      # files. Cheap basename match — a file totally absent from its index
      # fails; precise path-vs-path is left to review.
      - name: Check each tier README lists its files
        run: |
          set -euo pipefail
          drift=0
          for tier in eq sks ops system sks-team archive; do
            readme="$tier/README.md"
            [ -f "$readme" ] || continue
            for f in $(git ls-files "$tier/**/*.md" "$tier/*.md" 2>/dev/null | sort -u); do
              base=$(basename "$f")
              [ "$base" = "README.md" ] && continue
              if ! grep -qF "$base" "$readme"; then
                echo "::error file=$readme::$f is not listed in $readme (index drift)"
                drift=$((drift+1))
              fi
            done
          done
          if [ "$drift" -gt 0 ]; then
            echo "::error::$drift file(s) missing from their tier index."
            exit 1
          fi
          echo "All tier indexes match their folders."

  no-new-root-clutter:
    name: No new dated working-docs in root
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Server-side mirror of .githooks/pre-commit §17.5. Diffs against the PR
      # base and blocks only NEWLY-ADDED dated working-docs at repo root
      # (e.g. some-thing-2026-05-30.md). Existing root files are grandfathered;
      # new clutter must land in a tier, archive/, or sessions/.
      - name: Block newly-added dated root docs
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          added=$(git diff --diff-filter=A --name-only "$base"...HEAD || true)
          bad=$(echo "$added" | grep -E '^[^/]+-[0-9]{4}-[0-9]{2}-[0-9]{2}[^/]*\.md$' || true)
          if [ -n "$bad" ]; then
            echo "::error::New dated working-doc(s) added at repo root. Move to a tier, archive/, or sessions/:"
            echo "$bad"
            exit 1
          fi
          echo "No new dated root docs."
