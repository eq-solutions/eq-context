name: MD health check

# Mirror of .githooks/pre-commit — catches anything that bypassed the local hook.
# Rules: see MD_BEST_PRACTICES.md §17.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run MD health checks
        run: |
          set -euo pipefail
          violations=0

          echo "=== 17.1 — per-version CHANGELOG files ==="
          if git ls-files | grep -iE '(^|/)CHANGELOG-v[0-9]+\.[0-9]+(\.[0-9]+)?\.md$'; then
            echo "::error::Per-version changelog files found. Use rolling CHANGELOG.md."
            violations=$((violations+1))
          else
            echo "ok"
          fi

          echo ""
          echo "=== 17.2 — binary files ==="
          if git ls-files | grep -iE '\.(zip|tar|gz|7z|docx|doc|xlsx|xls|pptx|ppt|pdf|png|jpg|jpeg|gif|bmp|webp|mov|mp4|mp3|wav)$'; then
            echo "::error::Binary files in eq-context. Move to a project folder or S3/R2."
            violations=$((violations+1))
          else
            echo "ok"
          fi

          echo ""
          echo "=== 17.3 — _cleanup-patch-* folders ==="
          if git ls-files | grep -E '(^|/)_cleanup-patch-[^/]+/'; then
            echo "::error::Half-applied cleanup-patch folders should not be on main. Use a feature branch."
            violations=$((violations+1))
          else
            echo "ok"
          fi

          echo ""
          echo "=== 17.4 — session filenames ==="
          bad_sessions=$(git ls-files 'sessions/*' | grep -vE '^sessions/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$' || true)
          if [ -n "$bad_sessions" ]; then
            echo "::error::Non-canonical session filenames (must match YYYY-MM-DD.md):"
            echo "$bad_sessions"
            violations=$((violations+1))
          else
            echo "ok"
          fi

          echo ""
          echo "=== Duplicate-content session files ==="
          rm -f /tmp/_sha
          for f in $(git ls-files 'sessions/*.md'); do
            sha=$(git hash-object "$f")
            echo "$sha $f" >> /tmp/_sha
          done
          dup_count=$(sort /tmp/_sha | awk '{print $1}' | uniq -d | wc -l)
          if [ "$dup_count" -gt 0 ]; then
            echo "::error::Duplicate session content detected:"
            sort /tmp/_sha | awk '{print $1}' | uniq -d | while read -r dup; do
              grep "^$dup " /tmp/_sha
            done
            violations=$((violations+1))
          else
            echo "ok"
          fi

          echo ""
          echo "=== YAML frontmatter on tracked MDs ==="
          missing=0
          for f in $(git ls-files '*.md'); do
            case "$f" in
              README.md|drafts/*|.github/*|.githooks/*) continue ;;
            esac
            first=$(head -1 "$f" || true)
            if [ "$first" != "---" ]; then
              echo "::warning file=$f::Missing YAML frontmatter (MD_BEST_PRACTICES §2)"
              missing=$((missing+1))
            fi
          done
          echo "($missing files missing frontmatter — warning only, not blocking.)"

          echo ""
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations rule violation(s) above."
            exit 1
          fi
          echo "All MD health checks passed."
