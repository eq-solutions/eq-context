name: Verify ehow backup (R2 artifact integrity + content)

# Proves the ehow offsite backup is COMPLETE and NON-HOLLOW every day — automatically —
# not just that a file exists. This is the DATA-integrity half of the restore drill,
# automated: it pulls the freshest db_backup.tar.gz from R2, checks the archive is intact,
# and asserts the dump actually contains ROWS (incl. auth.users). So the exact failure
# classes issue #60 names — a schema-only / hollow dump, a truncated upload, a dropped
# auth capture — turn this job RED (→ Sentry) instead of hiding until an incident. The
# whole point of #60 is that a backup nobody verifies fails silently; this verifies it
# for us, daily, and pages if it can't.
#
# What it deliberately does NOT do: execute the SQL into a live database. Proving a clean
# restore + operational RTO is the rarer, human "game-day" in
# system/runbooks/supabase-restore-drill.md — it needs a real Supabase-parity target (a
# bare Postgres container lacks the managed `auth` schema, so an auth-data restore there
# would fail on a missing auth.users table). This job owns the continuous data-integrity
# guarantee; the game-day owns executability + the app-repoint path.
#
# Isolation: NEVER touches any live Supabase project — it only GETs the R2 artifact.
# Needs R2_* + SENTRY_DSN only (no DB URL, no service-role key) — the least-privilege job
# in the DR set.
#
# Schedule: daily 05:00 UTC (~15:00 AEST) — after ehow(02:00) / eq-canonical(03:00) /
# eq-canonical-internal(04:00) so it verifies the freshest backup. Manual: workflow_dispatch.
#
# Secrets (production-ops Environment): R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY /
# R2_ENDPOINT / R2_BUCKET_NAME, SENTRY_DSN. All already present from the backup arming.
#
# Parameterised for reuse: point R2_PREFIX / EXPECT_AUTH / EXPECT_ROWS at another project
# to add its verify (eq-canonical → prefix `eq-canonical`, etc.), same as the backup jobs.

on:
  schedule:
    # Every day 05:00 UTC (~15:00 AEST)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: ehow R2 backup → integrity + content assertions
    runs-on: ubuntu-latest
    # R2 keys + SENTRY_DSN are scoped to this Environment (main-only branch rule).
    environment: production-ops
    env:
      MONITOR_SLUG: ehow-backup-verify
      R2_PREFIX: ''                              # ehow writes at the bucket root
      EXPECT_AUTH: 'true'                        # ehow holds live auth.users
      EXPECT_ROWS: 'app_data.sites,app_data.customers'  # must show real COPY rows
    steps:
      # ── Sentry cron: check in "in_progress" (upserts the monitor incl. schedule) ──
      - name: Sentry check-in (start)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -uo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::warning::SENTRY_DSN not set — this verify run is UNMONITORED. Add SENTRY_DSN (production-ops) to arm cron alerting."
            exit 0
          fi
          KEY="${SENTRY_DSN#https://}"; KEY="${KEY%%@*}"
          REST="${SENTRY_DSN#*@}"; HOST="${REST%%/*}"; PID="${REST##*/}"
          BASE="https://${HOST}/api/${PID}/cron/${MONITOR_SLUG}/${KEY}"
          CID=$(curl -sS -X POST "${BASE}/" \
            -H 'Content-Type: application/json' \
            -d '{"status":"in_progress","monitor_config":{"schedule":{"type":"crontab","value":"0 5 * * *"},"checkin_margin":120,"max_runtime":20,"timezone":"UTC"}}' \
            | jq -r '.id // empty') || true
          echo "SENTRY_BASE=$BASE" >> "$GITHUB_ENV"
          echo "SENTRY_CID=$CID"  >> "$GITHUB_ENV"
          echo "Sentry monitor '${MONITOR_SLUG}' checked in (in_progress), id=${CID:-none}"

      - name: Install tools
        run: |
          set -euo pipefail
          pip install awscli --quiet
          jq --version

      # ── Pull the freshest backup for this project from R2 ──
      - name: Download latest backup tarball
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          # ehow writes at the bucket root (R2_PREFIX=''); other projects sit under a prefix.
          LIST_PATH="s3://${R2_BUCKET}/${R2_PREFIX:+${R2_PREFIX}/}"
          LATEST=$(aws s3 ls "$LIST_PATH" --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $NF}' | tr -d '/' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}' | sort | tail -1)
          if [ -z "${LATEST:-}" ]; then
            echo "::error::No dated backup folder found under ${LIST_PATH} — nothing to verify (backup may never have run)."
            exit 1
          fi
          echo "Latest backup folder: ${LATEST}"
          aws s3 cp \
            "s3://${R2_BUCKET}/${R2_PREFIX:+${R2_PREFIX}/}${LATEST}/db_backup.tar.gz" \
            db_backup.tar.gz \
            --endpoint-url "$R2_ENDPOINT"
          echo "LATEST=$LATEST" >> "$GITHUB_ENV"
          ls -lh db_backup.tar.gz

      # ── Assert the artifact is intact AND contains real rows (incl. auth) ──
      - name: Verify integrity + content
        run: |
          set -euo pipefail

          # 1. Archive is intact (catches a truncated/corrupt upload).
          gzip -t db_backup.tar.gz
          tar tzf db_backup.tar.gz >/dev/null
          mkdir -p unpack
          tar xzf db_backup.tar.gz -C unpack
          cd unpack
          echo "Members: $(ls -1)"

          # 2. Required members present and non-trivial.
          for f in roles.sql schema.sql data.sql; do
            if [ ! -s "$f" ]; then
              echo "::error::backup member '${f}' is missing or empty — incomplete dump."
              exit 1
            fi
          done

          # 3. data.sql must be a real data dump, not schema-only (the retired eq-service
          #    job's exact defect: a bare `supabase db dump` shipped zero COPY blocks).
          if ! grep -q '^COPY ' data.sql; then
            echo "::error::data.sql contains no COPY blocks — this is a schema-only / hollow backup."
            exit 1
          fi

          # Count data rows for a table across BOTH dump formats: a COPY block (data.sql
          # is dumped with --use-copy) OR INSERT statements (auth_data.sql is dumped
          # WITHOUT --use-copy, so auth.users lands as INSERTs — that mismatch turned the
          # first live run red). pg_dump only quotes identifiers that need it, so the
          # "?/[.] pattern matches quoted and unquoted; the [ (] tail avoids prefix
          # collisions (sites vs sites_history, users vs user_roles).
          count_rows () {  # $1=file $2=schema $3=table
            local copyc insertc
            copyc=$(awk -v s="$2" -v t="$3" '
              BEGIN { pat = "^COPY \"?" s "\"?[.]\"?" t "\"?[ (]" }
              $0 ~ pat {inblk=1; next}
              inblk && /^\\\.$/ {inblk=0; next}
              inblk {c++}
              END{print c+0}' "$1")
            insertc=$(grep -cE "^INSERT INTO \"?$2\"?[.]\"?$3\"?[ (]" "$1" || true)
            echo $((copyc + insertc))
          }

          # 4. Every EXPECT_ROWS table must have restored with real rows.
          IFS=',' read -ra TBLS <<< "${EXPECT_ROWS}"
          for qt in "${TBLS[@]}"; do
            sch="${qt%%.*}"; tbl="${qt#*.}"
            n=$(count_rows data.sql "$sch" "$tbl")
            echo "  ${sch}.${tbl}: ${n} rows in dump"
            if [ "$n" -le 0 ]; then
              echo "::error::table ${sch}.${tbl} has 0 rows in the backup — data missing or table renamed."
              exit 1
            fi
          done

          # 5. Auth capture (the crown jewel) where the project has users.
          if [ "${EXPECT_AUTH}" = "true" ]; then
            if [ ! -s auth_data.sql ]; then
              echo "::error::auth_data.sql is missing/empty but this project has live users — auth capture regressed."
              exit 1
            fi
            na=$(count_rows auth_data.sql auth users)
            echo "  auth.users: ${na} rows in dump"
            if [ "$na" -le 0 ]; then
              echo "::error::auth_data.sql present but 0 auth.users rows — hollow auth capture."
              exit 1
            fi
          fi

          echo "✅ ehow backup ${LATEST} verified: archive intact, data + auth rows present."

      # ── Sentry cron: report terminal status ──
      - name: Sentry check-in (ok)
        if: success() && env.SENTRY_BASE != ''
        run: |
          set -uo pipefail
          if [ -n "${SENTRY_CID:-}" ]; then
            curl -sS -X PUT "${SENTRY_BASE}/${SENTRY_CID}/" \
              -H 'Content-Type: application/json' -d '{"status":"ok"}' >/dev/null || true
          else
            curl -sS "${SENTRY_BASE}/?status=ok" >/dev/null || true
          fi
          echo "Sentry monitor checked in: ok"

      - name: Sentry check-in (error)
        if: failure() && env.SENTRY_BASE != ''
        run: |
          set -uo pipefail
          if [ -n "${SENTRY_CID:-}" ]; then
            curl -sS -X PUT "${SENTRY_BASE}/${SENTRY_CID}/" \
              -H 'Content-Type: application/json' -d '{"status":"error"}' >/dev/null || true
          else
            curl -sS "${SENTRY_BASE}/?status=error" >/dev/null || true
          fi
          echo "Sentry monitor checked in: error"
