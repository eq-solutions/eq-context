name: Claim expiry (F3 guard)

# The F3 guard, rung 3. A goal in system/TODAY.md that is unowned/undated, or one
# past its expires_on, FAILS this check.
#
# WHY: on 2026-07-11 an unowned, undated goal in a read_priority:critical file
# steered every session for two weeks while every green check verified recency,
# not truth or ownership (failure F3). This check verifies ownership + expiry —
# the thing frontmatter/line-ending checks structurally cannot see.
#
# Runs on any change to TODAY.md AND nightly: a goal can go stale by the calendar
# passing, with no commit. The nightly run is what turns a newly expired goal red.
# An empty goals section (claims: []) always passes — a blank goals section is
# honest; that is the whole lesson of F3.

on:
  pull_request:
    branches: [main]
    paths:
      - "system/TODAY.md"
      - "scripts/claim_expiry.py"
      - "scripts/test_claim_expiry.py"
      - ".github/workflows/claim-expiry.yml"
  push:
    branches: [main]
    paths:
      - "system/TODAY.md"
      - "scripts/claim_expiry.py"
  schedule:
    - cron: '0 18 * * *'   # 04:00 AEST — daily calendar re-check for expiry
  workflow_dispatch:

permissions:
  contents: read

jobs:
  claim-expiry:
    name: Claim expiry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Unit tests (the validator itself)
        run: python scripts/test_claim_expiry.py

      - name: Goals in TODAY.md are owned and unexpired
        run: python scripts/claim_expiry.py
