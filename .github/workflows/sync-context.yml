name: Sync context files to Supabase

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - '**/*.md'
      - 'scripts/sync.py'
      - '.github/workflows/sync-context.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Guard the slug-mapping + orphan-cap logic before it touches the
      # live store. The mass-delete is in here — a green test run is the
      # gate. See scripts/test_sync.py.
      - name: Test sync logic
        run: python3 scripts/test_sync.py

      # Full sync logic lives in scripts/sync.py (extracted from this file
      # 2026-06-04 so it is testable/runnable locally). Slug semantics are
      # pinned by the tests above — do not change them casually.
      - name: Sync all MD files to Supabase
        env:
          SUPABASE_URL: https://urjhmkhbgaxrofurpbgc.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Abort the orphan-delete if it would remove more than this many
          # rows (also capped at 25% of the store). Raise only for a genuine
          # bulk rename. See orphan_delete_blocked() in scripts/sync.py.
          MAX_ORPHAN_DELETE: '15'
        run: python3 scripts/sync.py
