name: Sync context files to Supabase

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - 'rules/**'
      - 'state/**'
      - 'knowledge/**'
      - 'sessions/**'
      - 'changelog/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync all MD files to Supabase
        env:
          SUPABASE_URL: https://vjvamvfpbwcqfudousmg.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.error
          import json
          import os
          import glob

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SERVICE_KEY  = os.environ["SUPABASE_SERVICE_ROLE_KEY"]

          # Root files: slug → filename
          ROOT_FILES = {
              "eq":     "CLAUDE.md",
              "sks":    "SKS-CONTEXT.md",
              "cowork": "COWORK-PROMPT.md",
              "rules":  "AI-RULES.md",
              "agents": "AGENTS.md",
          }

          # Subdirectory files: slug = relative path (e.g. "state/pending.md")
          SUBDIR_PATTERNS = [
              "state/*.md",
              "rules/*.md",
              "knowledge/*.md",
              "sessions/*.md",
              "changelog/*.md",
          ]

          def upsert(slug, filepath):
              try:
                  with open(filepath, "r") as f:
                      content = f.read()
              except FileNotFoundError:
                  print(f"  {slug}: {filepath} not found — skipping")
                  return

              payload = json.dumps({
                  "slug":     slug,
                  "filename": filepath,
                  "content":  content,
              }).encode("utf-8")

              req = urllib.request.Request(
                  f"{SUPABASE_URL}/rest/v1/context_files?on_conflict=slug",
                  data=payload,
                  headers={
                      "apikey":        SERVICE_KEY,
                      "Authorization": f"Bearer {SERVICE_KEY}",
                      "Content-Type":  "application/json",
                      "Prefer":        "resolution=merge-duplicates,return=minimal",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"  {slug}: synced ✓  [{len(content)} chars]")
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"  {slug}: ERROR {e.code} — {body}")
                  raise

          print("=== Syncing root context files ===")
          for slug, filename in ROOT_FILES.items():
              upsert(slug, filename)

          print("=== Syncing subdirectory MD files ===")
          for pattern in SUBDIR_PATTERNS:
              for filepath in sorted(glob.glob(pattern)):
                  slug = filepath  # e.g. "state/pending.md"
                  upsert(slug, filepath)

          print("Done.")
          PYEOF
