name: Refresh suite-state.md

on:
  schedule:
    # 10:00 UTC = 8pm AEST. Always-on — no dependency on Claude being open.
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI
  repository_dispatch:
    # Fired by EQ repos on push to main once EQ_CONTEXT_PAT (workflow scope)
    # is added to eq-context repo secrets and sender jobs are wired.
    types: [suite-state-changed]

permissions:
  contents: write   # commit suite-state.md back to main

concurrency:
  # Shared with digest-refresh — both fire on the same repository_dispatch and
  # both push to main, so they must not run concurrently or one loses its
  # `git push` to the other (fetch-first rejection). cancel-in-progress: false
  # queues each; every run regenerates from full current state.
  group: eq-context-substrate-push
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # GITHUB_TOKEN has contents:write via permissions above

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Refresh suite-state.md
        env:
          SUPABASE_URL:              https://ehowgjardagevnrluult.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # eq-shell/eq-service/eq-field/eq-cards are private — need EQ_CONTEXT_PAT
          # for cross-repo Actions/PR reads; falls back to GITHUB_TOKEN (public
          # repos only, e.g. eq-solves-intake) if the PAT isn't set.
          GH_TOKEN:                  ${{ secrets.EQ_CONTEXT_PAT || secrets.GITHUB_TOKEN }}
          NETLIFY_TOKEN:             ${{ secrets.NETLIFY_TOKEN }}
        run: python .github/scripts/refresh_suite_state.py

      - name: Commit if changed
        run: |
          git config user.name  "eq-suite-bot"
          git config user.email "bot@eq.solutions"
          git add suite-state.md
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: nightly suite state refresh $(date -u +%Y-%m-%d)"
          # Concurrency group serializes the bots; retry-with-rebase covers a
          # human push to main landing mid-run so we never fail stale.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest origin/main"
            git pull --rebase --autostash origin main || git rebase --abort || true
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
